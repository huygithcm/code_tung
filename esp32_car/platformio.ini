[env]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps =
    madhephaestus/ESP32Servo@^3.0.5

; ====== Bản DEBUG: bật log Serial, menu test, in telemetry ======
[env:debug]
build_flags = -DDEBUG_MODE=1

; ====== Bản PRODUCT: tắt log cho chạy nhanh/gọn ======
[env:release]
build_flags = -DDEBUG_MODE=0

; ====== Flash qua WiFi (OTA) - dung sau khi da flash USB 1 lan ======
; Chay:  pio run -e ota -t upload     (hoac .\flash.ps1 -Ota)
[env:ota]
build_flags = -DDEBUG_MODE=1
upload_protocol = espota
upload_port = 192.168.1.33
